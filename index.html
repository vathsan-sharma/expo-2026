<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asia’s Emerging Economies Expo 2026 | Gateway to Asia’s Expansion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                obsidian: '#0B1215',    // Deep Obsidian
                forest: '#1B4332',      // Deep Forest Green
                emerald: '#2DCC70',     // Emerald Spark
                platinum: '#E9ECEF',    // Soft Platinum
                white: '#FFFFFF',
                red: '#EF4444',         // Red accent for Canada/Alerts
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            animation: {
              'fade-in-up': 'fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'fade-in-down': 'fadeInDown 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'pulse-slow': 'pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
              'glow': 'glow 3s ease-in-out infinite',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(40px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeInDown: {
                '0%': { opacity: '0', transform: 'translateY(-40px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              glow: {
                '0%, 100%': { opacity: '0.3', filter: 'blur(20px)' },
                '50%': { opacity: '0.6', filter: 'blur(40px)' },
              }
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0B1215;
        color: #E9ECEF;
        overflow-x: hidden;
      }

      .reveal {
        opacity: 0;
        transform: translateY(40px) scale(0.98);
        transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        will-change: transform, opacity;
      }
      .reveal.active {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      /* Staggered reveal delays */
      .reveal-delay-1 { transition-delay: 100ms; }
      .reveal-delay-2 { transition-delay: 200ms; }
      .reveal-delay-3 { transition-delay: 300ms; }
      .reveal-delay-4 { transition-delay: 400ms; }

      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .glass-card:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: #2DCC70;
        transform: translateY(-8px) scale(1.02);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(45, 204, 112, 0.1);
      }

      .nav-link {
        position: relative;
        transition: color 0.3s ease;
      }
      .nav-link::after {
        content: '';
        position: absolute;
        width: 100%;
        height: 2px;
        bottom: -4px;
        left: 0;
        background-color: #2DCC70;
        transform: scaleX(0);
        transform-origin: right;
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .nav-link:hover::after {
        transform: scaleX(1);
        transform-origin: left;
      }
      
      .bg-dots {
        background-image: radial-gradient(rgba(45, 204, 112, 0.1) 1px, transparent 1px);
        background-size: 30px 30px;
      }

      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #0B1215;
      }
      ::-webkit-scrollbar-thumb {
        background: #1B4332;
        border: 2px solid #0B1215;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #2DCC70;
      }

      /* Hover glow for specific elements */
      .glow-on-hover:hover {
        box-shadow: 0 0 20px rgba(45, 204, 112, 0.4);
      }

      .parallax-wrapper {
        perspective: 1000px;
      }
      
      .stagger-container > * {
        opacity: 0;
        transform: translateY(20px);
      }
      
      .active .stagger-container > * {
        animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* Dynamic Progress Bar */
      #scroll-progress {
        position: fixed;
        top: 0;
        left: 0;
        height: 3px;
        background: linear-gradient(to right, #2DCC70, #1B4332);
        z-index: 1001;
        width: 0%;
        transition: width 0.1s ease;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="selection:bg-brand-emerald selection:text-brand-obsidian">
    <div id="scroll-progress"></div>
    <div id="root"></div>
    <script>
      window.addEventListener('scroll', () => {
        const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = (winScroll / height) * 100;
        document.getElementById('scroll-progress').style.width = scrolled + '%';
      });
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
